    <style>
        :root {
            --miraculous-red: #E63946;
            --miraculous-black: #1D1D1D;
            --miraculous-pink: #FF6B6B;
            --miraculous-purple: #6B4EFF;
            --miraculous-gold: #FFD166;
            --miraculous-blue: #4A90E2;
            --miraculous-light: #F8F9FA;
            --header-font: 'Poppins', sans-serif;
            --body-font: 'Quicksand', sans-serif;
            --magic-font: 'Dancing Script', cursive;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: var(--body-font);
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: var(--miraculous-light);
            line-height: 1.7;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        header {
            background: rgba(29, 29, 46, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(230, 57, 70, 0.3);
        }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; padding: 0 5%; height: 90px; max-width: 1600px; margin: 0 auto; }
        .logo-container { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .miraculous-icon { font-size: 42px; color: var(--miraculous-red); filter: drop-shadow(0 0 10px rgba(230, 57, 70, 0.7)); }
        .site-title { font-family: var(--magic-font); font-size: 38px; font-weight: 700; background: linear-gradient(45deg, var(--miraculous-red), var(--miraculous-pink), var(--miraculous-gold)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .nav-container { background: linear-gradient(90deg, var(--miraculous-black), var(--miraculous-red)); padding: 0 5%; }
        .nav-menu { display: flex; max-width: 1600px; margin: 0 auto; list-style: none; }
        .nav-link { color: white; text-decoration: none; padding: 18px 30px; font-weight: 600; display: block; font-family: var(--header-font); }
        .nav-link:hover, .nav-link.active { background: rgba(255, 255, 255, 0.15); }
        
        .category-hero {
            text-align: center;
            padding: 100px 5% 60px;
            background: radial-gradient(circle at 30% 20%, rgba(230, 57, 70, 0.6) 0%, rgba(107, 78, 255, 0.4) 40%, transparent 70%),
                        url('https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?ixlib=rb-1.2.1&auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
            margin-bottom: 40px;
        }
        
        .category-hero h1 { font-family: var(--magic-font); font-size: 64px; margin-bottom: 20px; color: white; text-shadow: 3px 3px 15px rgba(0, 0, 0, 0.7); }
        .category-hero p { font-size: 20px; max-width: 800px; margin: 0 auto 30px; }
        
        .season-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            position: sticky;
            top: 100px;
            z-index: 900;
            padding: 10px;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        
        .season-btn {
            padding: 10px 20px;
            border: 2px solid var(--miraculous-red);
            background: transparent;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
        }
        
        .season-btn.active, .season-btn:hover {
            background: var(--miraculous-red);
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.5);
        }
        
        .search-container {
            max-width: 600px;
            margin: 0 auto 40px;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            border-color: var(--miraculous-red);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.3);
        }
        
        .videos-section { padding: 20px 5%; max-width: 1600px; margin: 0 auto; }
        .videos-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .video-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }
        
        .video-item:hover { transform: translateY(-8px); background: rgba(255, 255, 255, 0.1); border-color: var(--miraculous-red); }
        .video-thumbnail { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-thumbnail img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .video-thumbnail::after { content: '▶'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30px; color: white; opacity: 0; transition: opacity 0.3s; }
        .video-item:hover .video-thumbnail::after { opacity: 0.8; }
        
        .video-info { padding: 15px; flex-grow: 1; }
        .video-info h3 { font-size: 16px; margin-bottom: 5px; color: var(--miraculous-gold); }
        .video-info p { font-size: 13px; color: rgba(255, 255, 255, 0.7); }
        .episode-badge { position: absolute; top: 10px; right: 10px; background: var(--miraculous-red); color: white; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 700; z-index: 10; }
        
        .video-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 2000; align-items: center; justify-content: center; }
        .video-modal.active { display: flex; }
        .video-modal-content { width: 95%; max-width: 1100px; background: #1a1a2e; border-radius: 15px; overflow: hidden; }
        .video-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: var(--miraculous-red); color: white; }
        .close-modal { cursor: pointer; font-size: 24px; }
        .iframe-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .loading { text-align: center; padding: 50px; font-size: 24px; color: var(--miraculous-gold); }
        
        footer { background: #0a0a1a; padding: 40px 5% 20px; margin-top: 60px; border-top: 2px solid var(--miraculous-red); text-align: center; }
        
        @media (max-width: 768px) {
            .category-hero h1 { font-size: 40px; }
            .season-selector { top: 80px; }
        }
    </style>

        let currentSeason = 'all';

        function renderEpisodes(filteredList) {
            const container = document.getElementById('episodesContainer');
            if (filteredList.length === 0) {
                container.innerHTML = '<div class="loading">Aucun épisode trouvé pour votre recherche.</div>';
                return;
            }

            container.innerHTML = filteredList.map(ep => `
                <div class="video-item" onclick="openModal('${ep.id}', 'Saison ${ep.s} Épisode ${ep.ep} - ${ep.title.replace(/'/g, "\\'")}')">
                    <div class="episode-badge">S${ep.s} E${ep.ep}</div>
                    <div class="video-thumbnail">
                        <img src="https://img.youtube.com/vi/${ep.id}/mqdefault.jpg" alt="${ep.title}" loading="lazy">
                    </div>
                    <div class="video-info">
                        <h3>${ep.title}</h3>
                        <p>${ep.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        function filterBySeason(season) {
            currentSeason = season;
            
            // Update buttons
            document.querySelectorAll('.season-btn').forEach(btn => btn.classList.remove('active'));
            if (season === 'all') {
                document.getElementById('btn-all').classList.add('active');
            } else {
                document.getElementById(`btn-${season}`).classList.add('active');
            }

            filterEpisodes();
        }

        function filterEpisodes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allEpisodes.filter(ep => {
                const matchesSeason = currentSeason === 'all' || ep.s == currentSeason;
                const matchesSearch = ep.title.toLowerCase().includes(searchTerm) || 
                                    ep.desc.toLowerCase().includes(searchTerm) ||
                                    `saison ${ep.s}`.includes(searchTerm) ||
                                    `épisode ${ep.ep}`.includes(searchTerm);
                return matchesSeason && matchesSearch;
            });

            renderEpisodes(filtered);
        }

        function openModal(id, title) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('player').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" allowfullscreen allow="autoplay"></iframe>`;
            document.getElementById('videoModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('videoModal').classList.remove('active');
            document.getElementById('player').innerHTML = '';
            document.body.style.overflow = '';
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Close modal on click outside
        document.getElementById('videoModal').addEventListener('click', (e) => {
            if (e.target.id === 'videoModal') closeModal();
        });

        // Initial render
        document.addEventListener('DOMContentLoaded', () => {
            renderEpisodes(allEpisodes);
        });
