            overflow-x: hidden;

        header {

            top: 0;

            border-bottom: 1px solid rgba(230, 57, 70, 0.3);

        .header-container { display: flex; justify-content: space-between; align-items: center; padding: 0 5%; height: 90px; max-width: 1600px; margin: 0 auto; }
        .logo-container { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .miraculous-icon { font-size: 42px; color: var(--miraculous-red); filter: drop-shadow(0 0 10px rgba(230, 57, 70, 0.7)); }
        .site-title { font-family: var(--magic-font); font-size: 38px; font-weight: 700; background: linear-gradient(45deg, var(--miraculous-red), var(--miraculous-pink), var(--miraculous-gold)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .nav-container { background: linear-gradient(90deg, var(--miraculous-black), var(--miraculous-red)); padding: 0 5%; }

        .nav-link:hover, .nav-link.active { background: rgba(255, 255, 255, 0.15); }
        
        .category-hero {
            text-align: center;
            padding: 100px 5% 60px;

            background-position: center;
            background-blend-mode: overlay;
            margin-bottom: 40px;
        }
        
        .category-hero h1 { font-family: var(--magic-font); font-size: 64px; margin-bottom: 20px; color: white; text-shadow: 3px 3px 15px rgba(0, 0, 0, 0.7); }
        .category-hero p { font-size: 20px; max-width: 800px; margin: 0 auto 30px; }
        
        .season-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            position: sticky;
            top: 100px;
            z-index: 900;
            padding: 10px;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        
        .season-btn {
            padding: 10px 20px;
            border: 2px solid var(--miraculous-red);
            background: transparent;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
        }
        
        .season-btn.active, .season-btn:hover {
            background: var(--miraculous-red);
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.5);
        }
        
        .search-container {
            max-width: 600px;
            margin: 0 auto 40px;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            border-color: var(--miraculous-red);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.3);
        }
        
        .videos-section { padding: 20px 5%; max-width: 1600px; margin: 0 auto; }
        .videos-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .video-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }
        
        .video-item:hover { transform: translateY(-8px); background: rgba(255, 255, 255, 0.1); border-color: var(--miraculous-red); }
        .video-thumbnail { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-thumbnail img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .video-thumbnail::after { content: '▶'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30px; color: white; opacity: 0; transition: opacity 0.3s; }
        .video-item:hover .video-thumbnail::after { opacity: 0.8; }
        
        .video-info { padding: 15px; flex-grow: 1; }

        let currentSeason = 'all';

        function renderEpisodes(filteredList) {
            const container = document.getElementById('episodesContainer');
            if (filteredList.length === 0) {
                container.innerHTML = '<div class="loading">Aucun épisode trouvé pour votre recherche.</div>';
                return;
            }

            container.innerHTML = filteredList.map(ep => `
                <div class="video-item" onclick="openModal('${ep.id}', 'Saison ${ep.s} Épisode ${ep.ep} - ${ep.title.replace(/'/g, "\\'")}')">
                    <div class="episode-badge">S${ep.s} E${ep.ep}</div>
                    <div class="video-thumbnail">
                        <img src="https://img.youtube.com/vi/${ep.id}/mqdefault.jpg" alt="${ep.title}" loading="lazy">
                    </div>
                    <div class="video-info">
                        <h3>${ep.title}</h3>
                        <p>${ep.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        function filterBySeason(season) {
            currentSeason = season;
            
            // Update buttons
            document.querySelectorAll('.season-btn').forEach(btn => btn.classList.remove('active'));
            if (season === 'all') {
                document.getElementById('btn-all').classList.add('active');
            } else {
                document.getElementById(`btn-${season}`).classList.add('active');
            }

            filterEpisodes();
        }

        function filterEpisodes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allEpisodes.filter(ep => {
                const matchesSeason = currentSeason === 'all' || ep.s == currentSeason;
                const matchesSearch = ep.title.toLowerCase().includes(searchTerm) || 
                                    ep.desc.toLowerCase().includes(searchTerm) ||
                                    `saison ${ep.s}`.includes(searchTerm) ||
                                    `épisode ${ep.ep}`.includes(searchTerm);
                return matchesSeason && matchesSearch;
            });

            renderEpisodes(filtered);
        }

        function openModal(id, title) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('player').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" allowfullscreen allow="autoplay"></iframe>`;
            document.getElementById('videoModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('videoModal').classList.remove('active');
            document.getElementById('player').innerHTML = '';
            document.body.style.overflow = '';
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Close modal on click outside
        document.getElementById('videoModal').addEventListener('click', (e) => {
            if (e.target.id === 'videoModal') closeModal();
        });

        // Initial render
        document.addEventListener('DOMContentLoaded', () => {
            renderEpisodes(allEpisodes);
        });
    </script>
